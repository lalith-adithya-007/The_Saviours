name: flutter_firebase_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 🔥 Firebase (Stable 2026 Versions)
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

  # 📂 File Picker (Version 10.3.10 fixes the recent "symbol" bugs)
  file_picker: ^10.3.10

  # 🌍 Country Code Picker (Updated to remove V1 embedding code)
  country_code_picker: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Tool to generate Android/iOS app icons automatically
  flutter_launcher_icons: ^0.13.1

# 🛠️ Launcher Icon Configuration
# This will take your logo.png and resize it for all Android/iOS screen densities
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # 🖼️ Asset Registration
  # This allows you to use Image.asset('assets/logo.png') in your code
  assets:
    - assets/logo.png