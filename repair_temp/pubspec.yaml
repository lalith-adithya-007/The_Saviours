name: repair_temp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1 

flutter:
  uses-material-design: true
  assets:
    - assets/

# This configuration MUST be at the top level (no indentation)
flutter_launcher_icons:
  android: "saviour"
  ios: true
  image_path: "assets/saviour.png"
  min_sdk_android: 21